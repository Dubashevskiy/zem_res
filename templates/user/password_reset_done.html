{% extends "layout.html" %}
{% block title %}
Відновлення пароля
{% endblock %}

{% block main %}
<h1>Лист успішно відправлений</h1>
<p>Вам на скриньку віправлений лист </p>
<form method="post" class="form form-section container">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="btn-outline-danger" type="submit">Запросити новий пароль</button>
</form>
{% endblock %}
