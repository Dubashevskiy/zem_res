{% extends "layout.html" %}
{% block title %}
Відновлення пароля
{% endblock %}

{% block main %}
<h1>Ви успішно оновили пароль</h1>
<p>Ваш пароль замінений</p>
<form method="post" class="form form-section container">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="btn-outline-danger" type="submit">Запросити новий пароль</button>
</form>
{% endblock %}
