{% extends 'layout.html' %}
{% load static %}
{% block main %}

<html>
<head>
    <meta charset="UTF-8">
    <title>Карта земельних ділянок</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        #map { height: 900px; }

    </style>
</head>
<body>
        <div class="modal fade" id="filterModal" tabindex="-1" aria-labelledby="filterModalLabel" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="filterModalLabel">Фільтри</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label for="searchInput" class="form-label">Кадастровий номер:</label>
                            <input id="searchInput" type="text" class="form-control" placeholder="0000000000:00:000:0000">
                            <button id="searchBtn" class="btn btn-primary mt-2">Пошук</button>
                        </div>
                        <div class="mb-3">
                            <label for="searchUserInput" class="form-label">Користувач:</label>
                            <input id="searchUserInput" type="text" class="form-control" placeholder="Введіть ім'я">
                            <button id="searchUserBtn" class="btn btn-primary mt-2">Пошук</button>
                        </div>
                        <div class="mb-3">
                            <label for="statusFilter" class="form-label">Вид користування:</label>
                            <select id="statusFilter" class="form-control">
                                <option value="">Усі</option>
                                <option value="1">Вільна</option>
                                <option value="2">Оренда</option>
                                <option value="3">Постійне користування</option>
                                <option value="4">Власність</option>
                                <option value="5">Аукціон</option>
                            </select>
                            <button id="statusFilterBtn" class="btn btn-primary mt-2">Пошук</button>
                        </div>
                        <div class="mb-3">
                            <label for="categoryFilter" class="form-label">Категорія:</label>
                            <select id="categoryFilter" class="form-control">
                                <option value="">Усі</option>
                                <option value="A">Землі с/г призначення</option>
                                <option value="B">Землі житлової забудови</option>
                                <option value="C">Землі природо-заповідного фонду</option>
                                <option value="D">Землі оздоровчого призначення</option>
                                <option value="E">Землі рекреаційного призначення</option>
                                <option value="F">Землі історико-культурного призначення</option>
                                <option value="G">Землі лісогосподарського призначення</option>
                                <option value="H">Землі водного фонду</option>
                                <option value="I">Землі промисловості</option>
                            </select>
                            <button id="categoryFilterBtn" class="btn btn-primary mt-2">Пошук</button>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Площа (га):</label>
                            <div class="row">
                                <div class="col">
                                    <input id="areaMin" type="number" class="form-control" placeholder="Мін" min="0" title="Введіть мінімальну площу ділянки (га)">
                                </div>
                                <div class="col">
                                    <input id="areaMax" type="number" class="form-control" placeholder="Макс" min="0" title="Введіть максимальну площу ділянки (га)">
                                </div>
                            </div>
                            <button id="filterAreaBtn" class="btn btn-primary mt-2">Фільтрувати</button>
                            <button id="resetBtn" class="btn btn-secondary mt-2 ms-2">Очистити</button>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Закрити</button>
                    </div>
                </div>
            </div>
        </div>
    <div id="spinner" class="spinner"></div>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    <script src="{% static 'js/geojson-vt.js' %}"></script>
    <script src="{% static 'js/leaflet-geojson-vt.js' %}"></script>
    <script>
        const ZHASHKIV_GEOJSON_URL = "{% static 'geo/Zhashkiv.geojson' %}";
        const ZHASH_TG_GEOJSON_URL = "{% static 'geo/Zhash_TG.geojson' %}";

    </script>
    <script src="{% static 'js/map.js' %}"></script>
</body>
</html>
{% endblock %}
